spring.application.name=shipment-service

#para que active application-dev.property y no este
spring.profiles.active=dev 

# Puerto dinámico (Render)
server.port=${PORT:8080}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Jackson
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# JWT
spring.security.jwt.secret=${JWT_SECRET}
spring.security.jwt.expiration=${JWT_EXPIRATION}

# Login
login.max-attempts=5
login.lock-time-ms=600000

# ejecute los scripts SQL al arrancar
spring.sql.init.mode=always

# espera que Hibernate termine de crear tus tablas antes de ejecutar el schema.sql
spring.jpa.defer-datasource-initialization=true